        function MathPromptGenerator() {
            const [step, setStep] = useState(0);
            const [copied, setCopied] = useState(false);
            const outputRef = useRef(null);
            const [promptLengthWarning, setPromptLengthWarning] = useState(false);
            
            const [answers, setAnswers] = useState({
                projectType: '', 
                level: '', 
                content: '',
                concepts: [],
                activityType: [],
                questionCount: '',
                difficulty: '',
                feedbackExtras: [],
                style: '',
                theme: '',
                interfaceStyle: '',
                techFormat: ''
            });

            const LAST_QUESTION_STEP = 11; 
            const RESULT_STEP = 12;

            const handleSingleSelect = (key, value) => {
                setAnswers({ ...answers, [key]: value });
            };

            const handleMultiSelect = (key, value) => {
                const list = answers[key];
                if (list.includes(value)) {
                    setAnswers({ ...answers, [key]: list.filter(item => item !== value) });
                } else {
                    setAnswers({ ...answers, [key]: [...list, value] });
                }
            };

            const nextStep = () => {
                if (step < RESULT_STEP) {
                    setStep(step + 1);
                }
            };

            const prevStep = () => {
                if (step > 0) setStep(step - 1);
            };

            // OPTIMIZED PROMPT GENERATION (Max 4000 chars strictly enforced)
            const generatePrompt = () => {
                const isDoc = answers.projectType === 'doc';
                const fbx = answers.feedbackExtras.length ? `, ${answers.feedbackExtras.join(', ')}` : "";
                const actStr = answers.activityType.length > 0 ? answers.activityType.join(', ') : "Au choix";

                let concepts = "";
                let source = "";
                
                // Static part is around ~1200 chars. We leave ~2800 chars for dynamic content.
                if (isDoc) {
                    concepts = "3. CONCEPTS: Strictement identiques au texte. N'invente aucune notion PFEQ hors texte.";
                    const MAX_CONTENT = 2500; // Hard cap for document length to avoid >4000 total
                    const safeContent = answers.content.length > MAX_CONTENT ? 
                                        answers.content.substring(0, MAX_CONTENT) + "\n...[TRONQUÉ POUR RESPECTER LA LIMITE DE CARACTÈRES]" : 
                                        answers.content;
                    source = `[DOC SOURCE]\n${safeContent}\n[FIN DOC]`;
                } else {
                    concepts = `3. CONCEPTS PFEQ:\n${answers.concepts.map(c => `- ${c}`).join('\n')}`;
                    source = `SOURCE: Création originale.`;
                }

                const prompt = `RÔLE: Créer une activité interactive. Expert PFEQ Maths, Dév Web senior, Designer QA.
BUT: Créer une activité math. (HTML/JS/CSS unique) gamifiée, robuste et mathématiquement parfaite.

[PARAMÈTRES]
1. PROJET: ${isDoc ? "Adaptation doc" : "Nouvelle création"} | 2. NIVEAU: ${answers.level}
${concepts}
${source}
4. FORMAT: ${actStr} | ${answers.questionCount} | Diff: ${answers.difficulty}
5. UX: Rétroaction immédiate, Recommencer, Score, Indices${fbx}
6. STYLE/THÈME: ${answers.style} / ${answers.theme || "Libre"}
7. TECH: ${answers.techFormat} | UI: ${answers.interfaceStyle}

🛑 CONTRAINTES ABSOLUES (ZÉRO TOLÉRANCE) :

1. RIGUEUR MATHÉMATIQUE INFAILLIBLE :
- 0 erreur. Validations et calculs 100% exacts.
- Équivalences requises : Prévois/accepte TOUTES les représentations valides (ex. 247 = 2c 4d 7u OU 24d 7u OU 2c 47u). L'IA doit être mathématiquement intelligente.
- Graphiques exhaustifs : TOUT plan cartésien, diagramme ou géométrie DOIT être 100% complet (titres, axes identifiés, graduations claires, données le long des axes, légendes, échelles exactes). Les arcs de cercles doivent être parfaitement positionnés lorsque des angles apparaissent.

2. VISUEL & INTERFACE IMPECCABLES :
- Rendu Premium (type jeu Netmath), alignements stricts, couleurs harmonieuses (${answers.theme || "Libre"}).
- Visuels générés : Utilise SVG/CSS pour tout support utile (fractions, figures, tableaux). Pas de math purement textuelle si le visuel aide.
- 0 bug visuel : aucun chevauchement, lisibilité parfaite sur tout écran.

3. ROBUSTESSE ET CODE (QA) :
- Mécanique (${actStr}) 100% fonctionnelle (Drag&Drop, minuteur, etc.).
- Code anti-crash : gère les champs vides et les doubles-clics. Ne plante jamais.
- 1 FICHIER UNIQUE (HTML+JS+CSS). Pas de alert() (utilise le DOM). Produit fini, jouable immédiatement.`;

                // Hard limit fallback just in case
                if(prompt.length > 4000) {
                    return prompt.substring(0, 3995) + "...";
                }
                return prompt;
            };

            useEffect(() => {
                if(step === RESULT_STEP) {
                    const len = generatePrompt().length;
                    setPromptLengthWarning(len > 3900);
                }
            }, [step, answers]);

            const copyToClipboard = () => {
                if (outputRef.current) {
                    outputRef.current.select();
                    outputRef.current.setSelectionRange(0, 99999); 
                    
                    let success = false;
                    try {
                        success = document.execCommand("copy");
                    } catch (err) {
                        console.error("Erreur copie", err);
                    }

                    if (success) {
                        setCopied(true);
                        setTimeout(() => setCopied(false), 2000);
                    } else {
                        alert("Le navigateur a bloqué la copie. Le texte est sélectionné, faites Ctrl+C.");
                    }
                }
            };

            const downloadPrompt = () => {
                const text = generatePrompt();
                const element = document.createElement("a");
                const file = new Blob([text], {type: 'text/plain'});
                element.href = URL.createObjectURL(file);
                element.download = "prompt_activite_math.txt";
                document.body.appendChild(element);
                element.click();
                document.body.removeChild(element);
            };

            const isStepValid = () => {
                if (step === 0) return true;
                if (step === 1 && answers.projectType) return true;
                if (step === 2 && answers.level) return true;
                if (step === 3) {
                    if (answers.projectType === 'doc') return answers.content.trim().length > 0;
                    return answers.concepts.length > 0;
                }
                if (step === 4 && answers.activityType.length > 0) return true;
                if (step === 5 && answers.questionCount) return true;
                if (step === 6 && answers.difficulty) return true;
                if (step === 7) return true; 
                if (step === 8 && answers.style) return true;
                if (step === 9 && answers.theme) return true; 
                if (step === 10 && answers.interfaceStyle) return true;
                if (step === 11 && answers.techFormat) return true;
                return false;
            };

            const renderStepContent = () => {
                switch (step) {
                    case 0:
                        return (
                            <div className="text-center py-6 animate-fadeIn">
                                <div className="bg-indigo-100 p-4 rounded-full w-20 h-20 mx-auto flex items-center justify-center mb-6">
                                    <div className="text-indigo-600"><Icons.Zap /></div>
                                </div>
                                <h2 className="text-2xl font-bold text-gray-800 mb-4">Générateur d'Activités Maths</h2>
                                <p className="text-gray-600 mb-8 max-w-lg mx-auto">
                                    Outil conforme à la <strong>Progression des Apprentissages (PDA)</strong> du Québec.
                                </p>
                                <button onClick={() => setStep(1)} className="bg-indigo-600 hover:bg-indigo-700 text-white px-8 py-3 rounded-lg font-medium transition flex items-center mx-auto gap-2 shadow-lg hover:shadow-xl transform hover:-translate-y-0.5">
                                    Commencer <div className="w-5 h-5"><Icons.ChevronRight /></div>
                                </button>
                            </div>
                        );
                    case 1: 
                        return (
                            <div className="space-y-4 animate-fadeIn">
                                <h3 className="text-xl font-semibold mb-4 text-indigo-900">1. Que souhaitez-vous faire ?</h3>
                                <div className="grid grid-cols-1 md:grid-cols-2 gap-4">
                                    <button onClick={() => handleSingleSelect('projectType', 'new')} className={`p-6 rounded-xl border-2 text-left transition relative overflow-hidden group ${answers.projectType === 'new' ? 'border-indigo-500 bg-indigo-50 text-indigo-800' : 'border-gray-200 hover:border-indigo-200 hover:bg-gray-50'}`}>
                                        <div className="flex items-center gap-3 mb-2 font-bold text-lg"><Icons.PlusSquare /> Nouvelle Activité (PFEQ)</div>
                                        <p className="text-sm opacity-80">Je choisis des notions précises de la PDA par cycle.</p>
                                    </button>
                                    <button onClick={() => handleSingleSelect('projectType', 'doc')} className={`p-6 rounded-xl border-2 text-left transition relative overflow-hidden group ${answers.projectType === 'doc' ? 'border-indigo-500 bg-indigo-50 text-indigo-800' : 'border-gray-200 hover:border-indigo-200 hover:bg-gray-50'}`}>
                                        <div className="flex items-center gap-3 mb-2 font-bold text-lg"><Icons.FileText /> Depuis un Document</div>
                                        <p className="text-sm opacity-80">Je fournis un texte et l'IA respecte 100% du contenu.</p>
                                    </button>
                                </div>
                            </div>
                        );
                    case 2: 
                        return (
                             <div className="space-y-4 animate-fadeIn">
                                <h3 className="text-xl font-semibold mb-4 text-indigo-900">2. Niveau Scolaire (Primaire)</h3>
                                <p className="text-sm text-gray-500 mb-4">La liste des concepts s'adaptera au cycle choisi.</p>
                                <div className="grid grid-cols-1 md:grid-cols-2 gap-3">
                                    {['1er Cycle (1re - 2e année)', '2e Cycle (3e - 4e année)', '3e Cycle (5e - 6e année)', 'Adaptation scolaire', 'Enrichissement'].map((opt) => (
                                        <button key={opt} onClick={() => handleSingleSelect('level', opt)} className={`p-4 rounded-lg border text-left transition ${answers.level === opt ? 'border-indigo-500 bg-indigo-50 text-indigo-700' : 'border-gray-200 hover:bg-gray-50'}`}>{opt}</button>
                                    ))}
                                </div>
                            </div>
                        );
                    case 3: 
                        if (answers.projectType === 'doc') {
                            return (
                                <div className="space-y-4 animate-fadeIn">
                                    <h3 className="text-xl font-semibold mb-2 text-indigo-900">3. Contenu du Document</h3>
                                    <div className="bg-amber-50 border-l-4 border-amber-400 p-4 mb-4 text-amber-800 text-sm">
                                        <strong>Meta-consigne active :</strong> L'activité n'utilisera QUE les concepts du texte ci-dessous. Le texte long sera tronqué pour respecter la limite de 4000 caractères du prompt final.
                                    </div>
                                    <textarea className="w-full p-4 border rounded-lg focus:ring-2 focus:ring-indigo-500 outline-none h-64 font-mono text-sm" placeholder="Collez votre exercice ici..." value={answers.content} onChange={(e) => setAnswers({...answers, content: e.target.value})}></textarea>
                                </div>
                            );
                        } else {
                            return (
                                <div className="space-y-4 animate-fadeIn">
                                    <div className="flex justify-between items-center mb-2">
                                        <h3 className="text-xl font-semibold text-indigo-900">3. Tous les Concepts PFEQ</h3>
                                        <span className="text-xs font-mono bg-indigo-100 text-indigo-800 px-2 py-1 rounded">Basé sur la PDA</span>
                                    </div>
                                    <div className="h-96 overflow-y-auto pr-2 space-y-6 custom-scrollbar">
                                        {Object.entries(PFEQ_PROGRESSION).map(([category, items]) => (
                                            <div key={category} className="bg-white rounded-lg border border-gray-200 p-4 shadow-sm">
                                                <h4 className="font-bold text-indigo-800 mb-3 border-b pb-2 flex items-center gap-2">
                                                    {category.includes("Arithmétique") && <span className="text-blue-500">🔢</span>}
                                                    {category.includes("Géométrie") && <span className="text-green-500">📐</span>}
                                                    {category.includes("Mesure") && <span className="text-orange-500">📏</span>}
                                                    {category.includes("Statistique") && <span className="text-purple-500">📊</span>}
                                                    {category}
                                                </h4>
                                                <div className="grid grid-cols-1 md:grid-cols-2 gap-2">
                                                    {items.map((item) => (
                                                        <button 
                                                            key={item} 
                                                            onClick={() => handleMultiSelect('concepts', item)} 
                                                            className={`p-2 text-sm rounded border text-left transition flex justify-between items-start hover:bg-gray-50 ${answers.concepts.includes(item) ? 'bg-indigo-50 border-indigo-400 text-indigo-900 ring-1 ring-indigo-400' : 'border-gray-100 text-gray-600'}`}
                                                        >
                                                            <span>{item}</span>
                                                            {answers.concepts.includes(item) && <div className="mt-1"><Icons.Check className="w-4 h-4 text-indigo-600" /></div>}
                                                        </button>
                                                    ))}
                                                </div>
                                            </div>
                                        ))}
                                    </div>
                                </div>
                            );
                        }
                    case 4: 
                        return (
                             <div className="space-y-4 animate-fadeIn">
                                <h3 className="text-xl font-semibold mb-2 text-indigo-900">4. Type d'activité</h3>
                                <p className="text-sm text-gray-500 mb-4">Sélection multiple possible.</p>
                                <div className="grid grid-cols-1 md:grid-cols-2 gap-3">
                                    {['QCM interactif', 'Réponse courte (numérique)', 'Glisser-déposer', 'Associer des éléments', 'Vrai/Faux', 'Défi chronométré', 'Parcours gamifié', 'Résolution de problème'].map((opt) => (
                                        <button key={opt} onClick={() => handleMultiSelect('activityType', opt)} className={`p-4 rounded-lg border text-left transition flex justify-between items-center ${answers.activityType.includes(opt) ? 'border-indigo-500 bg-indigo-50 text-indigo-700' : 'border-gray-200 hover:bg-gray-50'}`}>
                                            {opt} {answers.activityType.includes(opt) && <div className="w-4 h-4"><Icons.Check className="w-4 h-4" /></div>}
                                        </button>
                                    ))}
                                </div>
                            </div>
                        );
                    case 5:
                         return (
                            <div className="space-y-4 animate-fadeIn">
                                <h3 className="text-xl font-semibold mb-2 text-indigo-900">5. Nombre de questions</h3>
                                <div className="grid grid-cols-3 gap-3">
                                    {['10 questions', '15 questions', '20 questions', '25 questions', 'Progressif'].map((opt) => (
                                        <button key={opt} onClick={() => handleSingleSelect('questionCount', opt)} className={`p-4 rounded-lg border text-center transition ${answers.questionCount === opt ? 'border-indigo-500 bg-indigo-50 text-indigo-700' : 'border-gray-200 hover:bg-gray-50'}`}>{opt}</button>
                                    ))}
                                </div>
                            </div>
                        );
                    case 6:
                        return (
                            <div className="space-y-4 animate-fadeIn">
                                <h3 className="text-xl font-semibold mb-2 text-indigo-900">6. Difficulté</h3>
                                <div className="grid grid-cols-1 gap-3">
                                    {['Facile (Révision)', 'Modéré (Pratique)', 'Difficile (Défi)', 'Progressif', 'Adaptatif'].map((opt) => (
                                        <button key={opt} onClick={() => handleSingleSelect('difficulty', opt)} className={`p-4 rounded-lg border text-left transition ${answers.difficulty === opt ? 'border-indigo-500 bg-indigo-50 text-indigo-700' : 'border-gray-200 hover:bg-gray-50'}`}>{opt}</button>
                                    ))}
                                </div>
                            </div>
                        );
                    case 7:
                        return (
                            <div className="space-y-4 animate-fadeIn">
                                <h3 className="text-xl font-semibold mb-2 text-indigo-900">7. Rétroaction</h3>
                                <div className="bg-gray-100 p-3 rounded-lg text-sm text-gray-700 border-l-4 border-gray-400">
                                    <strong>Inclus :</strong> Vert/Rouge, Recommencer, Indices, Score.
                                </div>
                                <div className="grid grid-cols-1 md:grid-cols-2 gap-3">
                                    {['Barre de progression', 'Sons', 'Confettis', 'Explication détaillée'].map((opt) => (
                                        <button key={opt} onClick={() => handleMultiSelect('feedbackExtras', opt)} className={`p-3 text-sm rounded-lg border text-left transition flex justify-between items-center ${answers.feedbackExtras.includes(opt) ? 'border-indigo-500 bg-indigo-50 text-indigo-700' : 'border-gray-200 hover:bg-gray-50'}`}>{opt} {answers.feedbackExtras.includes(opt) && <div className="w-4 h-4"><Icons.Check className="w-4 h-4" /></div>}</button>
                                    ))}
                                </div>
                            </div>
                        );
                    case 8:
                        return (
                            <div className="space-y-4 animate-fadeIn">
                                <h3 className="text-xl font-semibold mb-2 text-indigo-900">8. Style</h3>
                                <div className="grid grid-cols-2 gap-3">
                                    {['Ludique', 'Formel', 'Narratif', 'Compétitif', 'Autonomie', 'Inclusif'].map((opt) => (
                                        <button key={opt} onClick={() => handleSingleSelect('style', opt)} className={`p-4 rounded-lg border text-center transition ${answers.style === opt ? 'border-indigo-500 bg-indigo-50 text-indigo-700' : 'border-gray-200 hover:bg-gray-50'}`}>{opt}</button>
                                    ))}
                                </div>
                            </div>
                        );
                    case 9:
                        return (
                            <div className="space-y-4 animate-fadeIn">
                                <h3 className="text-xl font-semibold mb-2 text-indigo-900">9. Univers & Thème</h3>
                                <p className="text-sm text-gray-500 mb-4">Choisissez un univers pour rendre l'activité immersive.</p>
                                <div className="h-96 overflow-y-auto pr-2 space-y-6 custom-scrollbar">
                                    {Object.entries(THEMES).map(([category, items]) => (
                                        <div key={category} className="bg-white rounded-lg border border-gray-200 p-4 shadow-sm">
                                            <h4 className="font-bold text-indigo-800 mb-3 border-b pb-2">{category}</h4>
                                            <div className="grid grid-cols-1 md:grid-cols-2 gap-2">
                                                {items.map((item) => (
                                                    <button 
                                                        key={item} 
                                                        onClick={() => handleSingleSelect('theme', item)} 
                                                        className={`p-2 text-sm rounded border text-left transition flex justify-between items-start hover:bg-gray-50 ${answers.theme === item ? 'bg-indigo-50 border-indigo-400 text-indigo-900 ring-1 ring-indigo-400' : 'border-gray-100 text-gray-600'}`}
                                                    >
                                                        <span>{item}</span>
                                                        {answers.theme === item && <div className="mt-1"><Icons.Check className="w-4 h-4 text-indigo-600" /></div>}
                                                    </button>
                                                ))}
                                            </div>
                                        </div>
                                    ))}
                                </div>
                            </div>
                        );
                    case 10:
                        return (
                            <div className="space-y-4 animate-fadeIn">
                                <h3 className="text-xl font-semibold mb-2 text-indigo-900">10. Interface</h3>
                                <div className="grid grid-cols-2 gap-3">
                                    {['Épurée', 'Colorée', 'Tablette', 'Accessible', 'Jeu Vidéo'].map((opt) => (
                                        <button key={opt} onClick={() => handleSingleSelect('interfaceStyle', opt)} className={`p-4 rounded-lg border text-center transition ${answers.interfaceStyle === opt ? 'border-indigo-500 bg-indigo-50 text-indigo-700' : 'border-gray-200 hover:bg-gray-50'}`}>{opt}</button>
                                    ))}
                                </div>
                            </div>
                        );
                    case 11:
                        return (
                            <div className="space-y-4 animate-fadeIn">
                                <h3 className="text-xl font-semibold mb-2 text-indigo-900">11. Technique</h3>
                                <div className="grid grid-cols-1 gap-3">
                                    {['Page Web Interactive (Fichier HTML)', 'Google Sites (Embed)', 'Code commenté'].map((opt) => (
                                        <button key={opt} onClick={() => handleSingleSelect('techFormat', opt)} className={`p-4 rounded-lg border text-left transition ${answers.techFormat === opt ? 'border-indigo-500 bg-indigo-50 text-indigo-700' : 'border-gray-200 hover:bg-gray-50'}`}>{opt}</button>
                                    ))}
                                </div>
                            </div>
                        );
                    case 12:
                        return (
                            <div className="space-y-6 animate-fadeIn">
                                <div className="text-center">
                                    <div className="bg-green-100 p-3 rounded-full w-16 h-16 mx-auto flex items-center justify-center mb-4 text-green-600"><Icons.Check className="w-8 h-8" /></div>
                                    <h2 className="text-2xl font-bold text-gray-800">Prompt Généré & Optimisé</h2>
                                    <p className="text-gray-600 mb-2">Les consignes sont compressées, strictes et limitées à 4000 caractères max.</p>
                                    <div className={`text-xs font-mono inline-block px-3 py-1 rounded-full ${generatePrompt().length > 3900 ? 'bg-amber-100 text-amber-800 border border-amber-300' : 'bg-green-50 text-green-700 border border-green-200'}`}>
                                        {generatePrompt().length} / 4000 caractères
                                    </div>
                                </div>
                                <div className="relative mb-4">
                                    <textarea 
                                        ref={outputRef}
                                        id="prompt-output"
                                        className="w-full p-4 h-80 border-2 border-indigo-200 rounded-xl font-mono text-sm bg-gray-50 text-gray-800 focus:border-indigo-500 outline-none" 
                                        value={generatePrompt()} 
                                        readOnly
                                    ></textarea>
                                </div>
                                <div className="flex flex-col gap-3 sm:flex-row sm:justify-center">
                                    <button onClick={copyToClipboard} className="bg-indigo-600 hover:bg-indigo-700 text-white px-6 py-3 rounded-lg shadow-lg flex items-center justify-center gap-2 font-bold transition transform hover:scale-105 active:scale-95 cursor-pointer">
                                        {copied ? <span className="flex items-center gap-2"><Icons.Check className="w-5 h-5"/> Copié !</span> : <span className="flex items-center gap-2"><Icons.Copy className="w-5 h-5 text-white"/> COPIER LE TEXTE</span>}
                                    </button>
                                    <button onClick={downloadPrompt} className="bg-white border-2 border-gray-300 hover:bg-gray-50 text-gray-700 px-6 py-3 rounded-lg shadow flex items-center justify-center gap-2 font-medium transition cursor-pointer">
                                        <Icons.Download className="w-5 h-5"/> Télécharger (.txt)
                                    </button>
                                </div>
                                <div className="flex justify-center mt-6">
                                    <button onClick={() => setStep(0)} className="text-indigo-600 hover:underline flex items-center gap-2 text-sm font-medium">
                                        <div className="w-4 h-4"><Icons.RefreshCw /></div> Créer une autre activité
                                    </button>
                                </div>
                            </div>
                        );
                    default: return null;
                }
            };

            return (
                <div className="max-w-2xl mx-auto my-8 bg-white rounded-xl shadow-xl overflow-hidden border border-gray-100 font-sans">
                    <div className="bg-indigo-700 p-4 text-white flex justify-between items-center">
                        <div className="flex items-center gap-2">
                            <div className="w-6 h-6"><Icons.Calculator /></div>
                            <h1 className="text-lg font-bold">Assistant PFEQ</h1>
                        </div>
                        {step > 0 && step < RESULT_STEP && (
                            <div className="text-xs font-medium bg-indigo-800 px-3 py-1 rounded-full border border-indigo-600">Étape {step}/{LAST_QUESTION_STEP}</div>
                        )}
                    </div>
                    {step > 0 && step < RESULT_STEP && (
                        <div className="w-full bg-gray-200 h-1.5">
                            <div className="bg-indigo-500 h-1.5 transition-all duration-300 ease-out" style={{ width: `${(step / LAST_QUESTION_STEP) * 100}%` }}></div>
                        </div>
                    )}
                    <div className="p-6 md:p-8">
                        {renderStepContent()}
                        
                        {step > 0 && step < RESULT_STEP && (
                            <div className="flex justify-between mt-8 pt-6 border-t border-gray-100">
                                <button onClick={prevStep} className="px-5 py-2 text-gray-500 hover:text-gray-800 hover:bg-gray-100 rounded-lg transition flex items-center gap-2 text-sm font-medium">
                                    <div className="w-4 h-4"><Icons.ChevronLeft /></div> Retour
                                </button>
                                <button 
                                    onClick={nextStep} 
                                    disabled={!isStepValid()} 
                                    className={`px-6 py-2 rounded-lg font-medium flex items-center gap-2 transition shadow-sm text-sm ${isStepValid() ? 'bg-indigo-600 hover:bg-indigo-700 text-white cursor-pointer transform hover:-translate-y-0.5' : 'bg-gray-300 text-gray-500 cursor-not-allowed'}`}
                                >
                                    {step === LAST_QUESTION_STEP ? 'Générer le Prompt' : 'Suivant'} 
                                    {step !== LAST_QUESTION_STEP && <div className="w-4 h-4"><Icons.ChevronRight /></div>}
                                </button>
                            </div>
                        )}
                    </div>
                </div>
            );
        }

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<MathPromptGenerator />);
    </script>
</body>
</html>
